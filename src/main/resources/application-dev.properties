spring.datasource.url=jdbc:h2:mem:hogwarts
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.show-sql=true
spring.output.ansi.enabled=always 
logging.level.edu.tcu.cs.hogwarts_artifacts_online.security=DEBUG
spring.ai.openai.base-url=${AI_OPENAI_ENDPOINT:https://api.openai.com/v1/chat/completions}
spring.ai.openai.api-key=${MY_API_KEY:YOUR_API_KEY}
spring.cloud.azure.storage.account-name=${AZURE_STORAGE_ACCOUNT_NAME:YOUR_ACCOUNT_NAME}
spring.cloud.azure.storage.account-key=${AZURE_STORAGE_ACCOUNT_KEY:YOUR_ACCOUNT_KEY}
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=20MB














