 # By default, the active profile is "dev". During production, it will be replaced to "prod" due to Azure's environment variables.

spring.profiles.active=dev
management.endpoints.web.exposure.include=health,info,metrics,env,beans,configprops,heapdump,httpexchanges,loggers,mappings,custom-beans
management.endpoint.health.show-details=always
management.endpoint.configprops.show-values=always
management.endpoint.health.probes.enabled=true
management.endpoint.env.show-values=always
server.port=8080
server.servlet.context-path=/api/v1
spring.web.resources.add-mappings=false

management.info.env.enabled=true
info.app.name=Hogwarts-artifacts-online
info.app.description=A web application that manages artifacts and wizards for Hogwarts School of Witchcraft and Wizardry
info.app.version=@project.version@
info.app.author= Ruzindana jules
info.app.links.github= https://github.com/jul1979/hogwarts-artifacts-online
management.info.git.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
# OU mode complet : affiche tout
management.info.git.mode=full
management.info.build.enabled=true
management.observations.annotations.enabled=true
management.httpexchanges.recording.enabled=true
















